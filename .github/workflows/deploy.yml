name: Deploy ke rt2.mluthfirr.id

# Auto-deploy setiap ada push ke branch main, atau jalankan manual dari tab Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-rt2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy melalui SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/rt2_dukacita
            git config --global --add safe.directory /var/www/rt2_dukacita

            echo ">> Menarik kode terbaru"
            git fetch --all --quiet
            git reset --hard origin/main

            echo ">> Composer"
            composer install --no-dev --optimize-autoloader --no-interaction

            echo ">> Build aset frontend"
            npm ci --no-audit --no-fund
            npm run build

            echo ">> Migrasi database"
            php artisan migrate --force

            echo ">> Optimalkan cache"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo ">> Hak akses"
            chown -R www-data:www-data /var/www/rt2_dukacita
            chmod -R 775 storage bootstrap/cache

            echo ">> Selesai"
